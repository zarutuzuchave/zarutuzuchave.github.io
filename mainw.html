<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nossa História 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink-light: #fce4ec;
      --pink:       #f48fb1;
      --pink-dark:  #e91e8c;
      --purple:     #9c27b0;
      --purple-dark:#6a1b9a;
      --lavender:   #f3e5f5;
      --white:      #ffffff;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--lavender);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    .heart-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .heart-bg span { position: absolute; bottom: -60px; animation: floatUp linear infinite; opacity: 0; font-size: 1.4rem; user-select: none; }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-15deg); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
    }
    .screen {
      display: none;
      position: relative;
      z-index: 10;
      min-height: 100vh;
      width: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .screen.active { display: flex; }
    .welcome-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      padding: 40px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(156,39,176,0.15);
      border: 2px solid var(--pink-light);
      max-width: 500px;
      width: 100%;
    }
    .main-title {
      font-family: 'Pacifico', cursive;
      font-size: 3rem;
      background: linear-gradient(135deg, var(--pink-dark), var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
    }
    .btn-couple {
      font-family: 'Pacifico', cursive;
      font-size: 1.4rem;
      padding: 15px 40px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--pink-dark), var(--purple-dark));
      color: var(--white);
      box-shadow: 0 6px 25px rgba(233,30,140,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-couple:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(233,30,140,0.5); }
    .gallery-container {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      padding: 30px;
      border-radius: 30px;
      width: min(700px, 95vw);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 2px solid var(--pink-light);
      text-align: center;
    }
    .gallery-title {
      font-family: 'Pacifico', cursive;
      font-size: 2.5rem;
      color: var(--purple-dark);
      margin-bottom: 25px;
    }
    .carousel-view {
      position: relative;
      width: 100%;
      height: 400px;
      border-radius: 20px;
      overflow: hidden;
      background: #1a1a1a;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    }
    .carousel-track {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .carousel-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    /* Botão de lixeira */
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(220, 50, 50, 0.85);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: background 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .delete-btn:hover { background: rgba(200, 20, 20, 1); transform: scale(1.1); }
    .no-photos {
      color: #aaa;
      font-style: italic;
      font-size: 1.1rem;
    }
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.7);
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--purple-dark);
      transition: background 0.2s;
      z-index: 15;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.9); }
    .prev-btn { left: 15px; }
    .next-btn { right: 15px; }
    .photo-counter {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 0.85rem;
      padding: 4px 12px;
      border-radius: 999px;
      z-index: 15;
      font-family: 'Nunito', sans-serif;
    }
    .actions-row {
      margin-top: 25px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-action {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-action:hover { transform: translateY(-2px); }
    .btn-upload { background: linear-gradient(135deg, var(--pink-dark), var(--purple)); color: white; }
    .btn-back { background: #e0e0e0; color: #444; }
    #fileInput { display: none; }
  </style>
</head>
<body>
  <div class="heart-bg" id="heartBg"></div>

  <div class="screen active" id="screen1">
    <div class="welcome-card">
      <h1 class="main-title">Seja Bem-vindo ✨</h1>
      <button class="btn-couple" id="enterBtn">Ana e Filipe 💜</button>
    </div>
  </div>

  <div class="screen" id="screen2">
    <div class="gallery-container">
      <h2 class="gallery-title">Nossas Memórias 📸</h2>
      <div class="carousel-view">
        <button class="nav-btn prev-btn" id="prevBtn">❮</button>
        <div class="carousel-track" id="carouselTrack">
          <div class="carousel-slide active">
            <div class="no-photos">Nenhuma foto adicionada ainda. Clique abaixo para começar! 🌸</div>
          </div>
        </div>
        <button class="nav-btn next-btn" id="nextBtn">❯</button>
      </div>
      <div class="actions-row">
        <button class="btn-action btn-upload" id="uploadBtn">➕ Adicionar Foto</button>
        <button class="btn-action btn-back" id="backBtn">⬅ Voltar</button>
        <input type="file" id="fileInput" accept="image/*" multiple />
      </div>
    </div>
  </div>

  <script>
    const heartBg = document.getElementById('heartBg');
    const symbols = ['💜','💗','💕','💖','💓','🌸','✨','💝'];
    for (let i = 0; i < 30; i++) {
      const span = document.createElement('span');
      span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      span.style.left = `${Math.random() * 100}%`;
      span.style.fontSize = `${0.9 + Math.random() * 1.4}rem`;
      span.style.animationDuration = `${6 + Math.random() * 10}s`;
      span.style.animationDelay = `${Math.random() * 8}s`;
      heartBg.appendChild(span);
    }

    const screen1 = document.getElementById('screen1');
    const screen2 = document.getElementById('screen2');
    document.getElementById('enterBtn').addEventListener('click', () => {
      screen1.classList.remove('active');
      screen2.classList.add('active');
    });
    document.getElementById('backBtn').addEventListener('click', () => {
      screen2.classList.remove('active');
      screen1.classList.add('active');
    });

    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const carouselTrack = document.getElementById('carouselTrack');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let photos = [];
    let currentIndex = 0;

    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const files = e.target.files;
      for (let i = 0; i < files.length; i++) {
        const reader = new FileReader();
        reader.onload = function(event) {
          photos.push(event.target.result);
          if (photos.length === 1) currentIndex = 0;
          updateCarousel();
        };
        reader.readAsDataURL(files[i]);
      }
      fileInput.value = '';
    });

    function deletePhoto(index) {
      photos.splice(index, 1);
      if (photos.length === 0) { currentIndex = 0; }
      else if (currentIndex >= photos.length) { currentIndex = photos.length - 1; }
      updateCarousel();
    }

    function updateCarousel() {
      carouselTrack.innerHTML = '';

      if (photos.length === 0) {
        carouselTrack.innerHTML = `
          <div class="carousel-slide active">
            <div class="no-photos">Nenhuma foto adicionada ainda. Clique abaixo para começar! 🌸</div>
          </div>`;
        return;
      }

      if (currentIndex >= photos.length) currentIndex = 0;
      if (currentIndex < 0) currentIndex = photos.length - 1;

      photos.forEach((photoUrl, index) => {
        const slide = document.createElement('div');
        slide.className = `carousel-slide ${index === currentIndex ? 'active' : ''}`;

        const img = document.createElement('img');
        img.src = photoUrl;
        img.alt = `Momento ${index + 1}`;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '🗑️';
        delBtn.title = 'Excluir foto';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deletePhoto(index);
        });

        slide.appendChild(img);
        slide.appendChild(delBtn);
        carouselTrack.appendChild(slide);
      });

      // Contador
      const counter = document.createElement('div');
      counter.className = 'photo-counter';
      counter.textContent = `${currentIndex + 1} / ${photos.length}`;
      carouselTrack.appendChild(counter);
    }

    nextBtn.addEventListener('click', () => {
      if (photos.length > 0) {
        currentIndex = (currentIndex + 1) % photos.length;
        updateCarousel();
      }
    });

    prevBtn.addEventListener('click', () => {
      if (photos.length > 0) {
        currentIndex = (currentIndex - 1 + photos.length) % photos.length;
        updateCarousel();
      }
    });
  </script>
</body>
</html>

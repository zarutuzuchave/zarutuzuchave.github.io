<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nossa História 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* O CSS continua idêntico para manter o design lindo que você já tem */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink-light: #fce4ec;
      --pink:       #f48fb1;
      --pink-dark:  #e91e8c;
      --purple:     #9c27b0;
      --purple-dark:#6a1b9a;
      --lavender:   #f3e5f5;
      --white:      #ffffff;
    }
    body { font-family: 'Nunito', sans-serif; background: var(--lavender); min-height: 100vh; overflow-x: hidden; position: relative; }
    .heart-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .heart-bg span { position: absolute; bottom: -60px; animation: floatUp linear infinite; opacity: 0; font-size: 1.4rem; user-select: none; }
    @keyframes floatUp { 0% { transform: translateY(0) rotate(-15deg); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.3; } 100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; } }
    .screen { display: none; position: relative; z-index: 10; min-height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .screen.active { display: flex; }
    .welcome-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(156,39,176,0.15); border: 2px solid var(--pink-light); max-width: 500px; width: 100%; }
    .main-title { font-family: 'Pacifico', cursive; font-size: 3rem; background: linear-gradient(135deg, var(--pink-dark), var(--purple)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
    .btn-couple { font-family: 'Pacifico', cursive; font-size: 1.4rem; padding: 15px 40px; border-radius: 999px; border: none; cursor: pointer; background: linear-gradient(135deg, var(--pink-dark), var(--purple-dark)); color: var(--white); box-shadow: 0 6px 25px rgba(233,30,140,0.35); transition: transform 0.2s, box-shadow 0.2s; }
    .btn-couple:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(233,30,140,0.5); }
    .gallery-container { background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); padding: 30px; border-radius: 30px; width: min(700px, 95vw); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--pink-light); text-align: center; }
    .gallery-title { font-family: 'Pacifico', cursive; font-size: 2.5rem; color: var(--purple-dark); margin-bottom: 25px; }
    .carousel-view { position: relative; width: 100%; height: 400px; border-radius: 20px; overflow: hidden; background: #1a1a1a; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
    .carousel-track { width: 100%; height: 100%; position: relative; }
    .carousel-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.5s ease-in-out; display: flex; align-items: center; justify-content: center; }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: contain; }
    
    /* Indicador de carregamento (Loading) */
    .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); color: white; display: none; align-items: center; justify-content: center; z-index: 30; font-family: 'Nunito'; font-size: 1.2rem; }
    .loading-overlay.active { display: flex; }

    .delete-btn { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(220, 50, 50, 0.85); color: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 20; transition: background 0.2s, transform 0.2s; backdrop-filter: blur(4px); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .delete-btn:hover { background: rgba(200, 20, 20, 1); transform: scale(1.1); }
    .carousel-slide.is-fixed .delete-btn { display: none; }
    .no-photos { color: #aaa; font-style: italic; font-size: 1.1rem; padding: 20px;}
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.7); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; color: var(--purple-dark); transition: background 0.2s; z-index: 15; }
    .nav-btn:hover { background: rgba(255,255,255,0.9); }
    .prev-btn { left: 15px; }
    .next-btn { right: 15px; }
    .photo-counter { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.45); color: white; font-size: 0.85rem; padding: 4px 12px; border-radius: 999px; z-index: 15; font-family: 'Nunito', sans-serif; }
    .actions-row { margin-top: 25px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    .btn-action { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1rem; padding: 12px 24px; border-radius: 999px; border: none; cursor: pointer; transition: transform 0.2s; }
    .btn-action:hover { transform: translateY(-2px); }
    .btn-upload { background: linear-gradient(135deg, var(--pink-dark), var(--purple)); color: white; }
    .btn-back { background: #e0e0e0; color: #444; }
    #fileInput { display: none; }
  </style>
</head>
<body>
  <div class="heart-bg" id="heartBg"></div>

  <div class="screen active" id="screen1">
    <div class="welcome-card">
      <h1 class="main-title">Seja Bem-vindo ✨</h1>
      <button class="btn-couple" id="enterBtn">Ana e Filipe 💜</button>
      <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
        <button onclick="window.history.back()" class="btn-couple" style="padding: 10px 10px; border-radius: 20px; border: none; background-color: #820fbc; color: white; cursor: pointer;">
          Voltar
        </button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen2">
    <div class="gallery-container">
      <h2 class="gallery-title">Nossas Memórias 📸</h2>
      <div class="carousel-view">
        
        <div class="loading-overlay" id="loadingOverlay">Enviando foto... ⏳</div>

        <button class="nav-btn prev-btn" id="prevBtn">❮</button>
        <div class="carousel-track" id="carouselTrack"></div>
        <button class="nav-btn next-btn" id="nextBtn">❯</button>
      </div>
      <div class="actions-row">
        <button class="btn-action btn-upload" id="uploadBtn">➕ Adicionar Foto</button>
        <button class="btn-action btn-back" id="backBtn">⬅ Voltar</button>
        <input type="file" id="fileInput" accept="image/*" />
      </div>
    </div>
  </div>

  <script type="module">
    // Importações do Firebase v9+
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    // ==========================================
    // ⚠️ SUBSTITUA O CÓDIGO ABAIXO PELAS SUAS CHAVES
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDUAtboDzC_FVK80S4bwoYwVZSrgfaIztc",
      authDomain: "nossa-historia-18345.firebaseapp.com",
      projectId: "nossa-historia-18345",
      storageBucket: "nossa-historia-18345.firebasestorage.app",
      messagingSenderId: "583866699214",
      appId: "1:583866699214:web:ef6d01d3cbd33d24706f9f",
      measurementId: "G-JBKX6YJ2TB"
    };
    // ==========================================

    // Inicializando o Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Fotos fixas do seu computador (GitHub)
    const fixedPhotos = [
    "WhatsApp Image 2026-06-22 at 12.57.33.jpg",
    "WhatsApp Image 2026-06-22 at 12.57.42.jpg",
    "WhatsApp Image 2026-06-22 at 12.58.00.jpg",
    "WhatsApp Image 2026-06-22 at 12.58.32.jpg",
    "WhatsApp Image 2026-06-22 at 12.58.49.jpg",
    "WhatsApp Image 2026-06-22 at 12.58.57.jpg",
    "WhatsApp Image 2026-06-22 at 12.59.11.jpg",
    ];

    let uploadedPhotos = []; 
    let currentIndex = 0;

    // Elementos da tela
    const carouselTrack = document.getElementById('carouselTrack');
    const fileInput = document.getElementById('fileInput');
    const loadingOverlay = document.getElementById('loadingOverlay');

    // === LER FOTOS DO BANCO DE DADOS EM TEMPO REAL ===
    // Isso faz com que toda vez que alguém abrir o site (ou adicionar foto), ele atualize sozinho!
    const q = query(collection(db, "fotos_casal"), orderBy("timestamp", "asc"));
    
    onSnapshot(q, (snapshot) => {
      uploadedPhotos = [];
      snapshot.forEach((doc) => {
        // Guarda o link da foto e o ID do documento (para poder deletar depois)
        uploadedPhotos.push({ id: doc.id, url: doc.data().url, fileName: doc.data().fileName });
      });
      updateCarousel();
    });

    // === FAZER UPLOAD DA FOTO ===
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // Mostra a tela de carregamento (porque enviar para a nuvem demora uns segundos)
      loadingOverlay.classList.add('active');

      try {
        // 1. Cria um nome único para o arquivo
        const uniqueFileName = Date.now() + '_' + file.name;
        const storageRef = ref(storage, 'fotos/' + uniqueFileName);

        // 2. Envia a foto para o Firebase Storage
        await uploadBytes(storageRef, file);
        
        // 3. Pega o link permanente da foto gerada
        const downloadURL = await getDownloadURL(storageRef);

        // 4. Salva esse link no Banco de Dados (Firestore)
        await addDoc(collection(db, "fotos_casal"), {
          url: downloadURL,
          fileName: uniqueFileName,
          timestamp: Date.now()
        });

        // Vai para a última foto
        currentIndex = fixedPhotos.length + uploadedPhotos.length; 
        
      } catch (error) {
        console.error("Erro ao enviar foto:", error);
        alert("Ocorreu um erro ao enviar a foto. Verifique se configurou o Firebase corretamente no modo de teste.");
      }

      // Esconde a tela de carregamento e limpa o input
      loadingOverlay.classList.remove('active');
      fileInput.value = '';
    });

    // === DELETAR FOTO DA NUVEM ===
    window.deleteFirebasePhoto = async function(docId, fileName) {
      if(!confirm("Tem certeza que deseja apagar esta foto para sempre?")) return;
      
      try {
        // Deleta do Banco de Dados
        await deleteDoc(doc(db, "fotos_casal", docId));
        
        // Deleta o arquivo físico do Storage
        const desertRef = ref(storage, 'fotos/' + fileName);
        await deleteObject(desertRef);
        
        currentIndex = 0; // Volta pro início para não quebrar a tela
      } catch(error) {
        console.error("Erro ao deletar:", error);
      }
    };

    // === DESENHAR O CARROSSEL ===
    function updateCarousel() {
      carouselTrack.innerHTML = '';
      const totalPhotos = fixedPhotos.length + uploadedPhotos.length;

      if (totalPhotos === 0) {
        carouselTrack.innerHTML = `
          <div class="carousel-slide active">
            <div class="no-photos">Nenhuma foto adicionada ainda. Clique abaixo para começar! 🌸</div>
          </div>`;
        return;
      }

      if (currentIndex >= totalPhotos) currentIndex = 0;
      if (currentIndex < 0) currentIndex = totalPhotos - 1;

      // Desenha as Fotos Fixas
      fixedPhotos.forEach((photoUrl, index) => {
        createSlide(photoUrl, index, true);
      });

      // Desenha as Fotos da Nuvem (Firebase)
      uploadedPhotos.forEach((photoObj, i) => {
        const index = fixedPhotos.length + i;
        createSlide(photoObj.url, index, false, photoObj.id, photoObj.fileName);
      });

      const counter = document.createElement('div');
      counter.className = 'photo-counter';
      counter.textContent = `${currentIndex + 1} / ${totalPhotos}`;
      carouselTrack.appendChild(counter);
    }

    // Função auxiliar para criar os slides (HTML)
    function createSlide(photoUrl, index, isFixed, docId = null, fileName = null) {
      const slide = document.createElement('div');
      slide.className = `carousel-slide ${index === currentIndex ? 'active' : ''} ${isFixed ? 'is-fixed' : ''}`;

      const img = document.createElement('img');
      img.src = photoUrl;
      img.alt = `Momento ${index + 1}`;
      slide.appendChild(img);

      if (!isFixed) {
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '🗑️';
        delBtn.title = 'Excluir foto';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteFirebasePhoto(docId, fileName);
        });
        slide.appendChild(delBtn);
      }

      carouselTrack.appendChild(slide);
    }

    // === NAVEGAÇÃO ENTRE TELAS E BOTÕES ===
    document.getElementById('prevBtn').addEventListener('click', () => {
      const totalPhotos = fixedPhotos.length + uploadedPhotos.length;
      if (totalPhotos > 0) { currentIndex = (currentIndex - 1 + totalPhotos) % totalPhotos; updateCarousel(); }
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      const totalPhotos = fixedPhotos.length + uploadedPhotos.length;
      if (totalPhotos > 0) { currentIndex = (currentIndex + 1) % totalPhotos; updateCarousel(); }
    });
    
    document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());
    document.getElementById('enterBtn').addEventListener('click', () => { document.getElementById('screen1').classList.remove('active'); document.getElementById('screen2').classList.add('active'); });
    document.getElementById('backBtn').addEventListener('click', () => { document.getElementById('screen2').classList.remove('active'); document.getElementById('screen1').classList.add('active'); });

    // Inicia os corações do fundo
    const heartBg = document.getElementById('heartBg');
    const symbols = ['💜','💗','💕','💖','💓','🌸','✨','💝'];
    for (let i = 0; i < 30; i++) {
      const span = document.createElement('span');
      span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      span.style.left = `${Math.random() * 100}%`;
      span.style.fontSize = `${0.9 + Math.random() * 1.4}rem`;
      span.style.animationDuration = `${6 + Math.random() * 10}s`;
      span.style.animationDelay = `${Math.random() * 8}s`;
      heartBg.appendChild(span);
    }
  </script>
</body>
</html>

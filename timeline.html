<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Linha do Tempo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0813; /* Fundo escuro profundo para destacar o neon */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- ANIMAÇÃO DO CORAÇÃO NO FUNDO --- */
        .heart-container {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .heart {
            background-color: rgba(255, 46, 99, 0.25);
            display: inline-block;
            height: 350px;
            position: relative;
            transform: rotate(-45deg);
            width: 350px;
            animation: pulse 1.6s infinite ease-in-out;
            /* Efeito de brilho (glow) no coração */
            filter: drop-shadow(0 0 40px rgba(255, 46, 99, 0.65));
        }

        .heart:before,
        .heart:after {
            content: "";
            background-color: rgba(255, 46, 99, 0.25);
            border-radius: 50%;
            height: 350px;
            position: absolute;
            width: 350px;
        }

        .heart:before {
            top: -175px;
            left: 0;
        }

        .heart:after {
            left: 175px;
            top: 0;
        }

        @keyframes pulse {
            0% {
                transform: scale(1) rotate(-45deg);
                filter: drop-shadow(0 0 30px rgba(255, 46, 99, 0.5));
            }
            50% {
                transform: scale(1.12) rotate(-45deg);
                filter: drop-shadow(0 0 60px rgba(255, 46, 99, 0.9));
            }
            100% {
                transform: scale(1) rotate(-45deg);
                filter: drop-shadow(0 0 30px rgba(255, 46, 99, 0.5));
            }
        }

        /* --- PAINEL CENTRAL (TIMELINE) --- */
        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 50px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 650px;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #ff2e63;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 46, 99, 0.4);
        }

        p.subtitle {
            color: #b3b0be;
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        /* Layout dos contadores */
        .timeline {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 10px;
            border-radius: 16px;
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.07);
        }

        .number {
            display: block;
            font-size: 2.2rem;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.2;
        }

        .label {
            display: block;
            font-size: 0.8rem;
            color: #ff2e63;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Responsividade para telas menores */
        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            .timeline { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .time-box { padding: 12px 5px; }
            .number { font-size: 1.6rem; }
            .label { font-size: 0.7rem; }
            .heart { width: 250px; height: 250px; }
            .heart:before, .heart:after { width: 250px; height: 250px; }
            .heart:before { top: -125px; }
            .heart:after { left: 125px; }
        }
    </style>
</head>
<body>

    <div class="heart-container">
        <div class="heart"></div>
    </div>

    <div class="container">
        <h1>Nosso Tempo Juntos</h1>
        <p class="subtitle">Cada segundo ao seu lado é especial...</p>
        
        <div class="timeline">
            <div class="time-box">
                <span id="months" class="number">00</span>
                <span class="label">Meses</span>
            </div>
            <div class="time-box">
                <span id="days" class="number">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="time-box">
                <span id="hours" class="number">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="time-box">
                <span id="minutes" class="number">00</span>
                <span class="label">Minut.</span>
            </div>
            <div class="time-box">
                <span id="seconds" class="number">00</span>
                <span class="label">Segund.</span>
            </div>
        </div>
    </div>

    <script>
        // === CONFIGURAÇÃO DA DATA INICIAL ===
        // Substitua os valores abaixo pela data desejada (Ano, Mês [0-11], Dia, Hora, Minuto)
        // ATENÇÃO: Os meses no JavaScript começam em 0 (Janeiro = 0, Fevereiro = 1, ... Dezembro = 11)
        // Exemplo: 12 de Junho de 2025 às 20h00min: new Date(2025, 5, 12, 20, 00)
        const dataInicial = new Date(2024, 5, 6, 0, 0); 

        function atualizarContador() {
            const agora = new Date();
            
            // Cálculo preciso de meses inteiros decorridos
            let mesesDecorridos = (agora.getFullYear() - dataInicial.getFullYear()) * 12 + (agora.getMonth() - dataInicial.getMonth());
            
            // Criar uma data temporária para ajustar se o dia atual for menor que o dia inicial
            let dataTemporaria = new Date(dataInicial);
            dataTemporaria.setMonth(dataTemporaria.getMonth() + mesesDecorridos);
            
            if (dataTemporaria > agora) {
                mesesDecorridos--;
                dataTemporaria = new Date(dataInicial);
                dataTemporaria.setMonth(dataTemporaria.getMonth() + mesesDecorridos);
            }
            
            // Diferença em milissegundos a partir dos meses já computados
            let diferencaMs = agora - dataTemporaria;
            
            // Conversão dos milissegundos restantes em Dias, Horas, Minutos e Segundos
            const umDia = 1000 * 60 * 60 * 24;
            const umaHora = 1000 * 60 * 60;
            const umMinuto = 1000 * 60;
            
            const dias = Math.floor(diferencaMs / umDia);
            diferencaMs %= umDia;
            
            const horas = Math.floor(diferencaMs / umaHora);
            diferencaMs %= umaHora;
            
            const minutos = Math.floor(diferencaMs / umMinuto);
            diferencaMs %= umMinuto;
            
            const segundos = Math.floor(diferencaMs / 1000);
            
            // Atualizar os elementos na página adicionando o zero à esquerda se for menor que 10
            document.getElementById('months').innerText = mesesDecorridos.toString().padStart(2, '0');
            document.getElementById('days').innerText = dias.toString().padStart(2, '0');
            document.getElementById('hours').innerText = horas.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutos.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = segundos.toString().padStart(2, '0');
        }

        // Executa a função imediatamente e depois a cada 1 segundo
        atualizarContador();
        setInterval(atualizarContador, 1000);
    </script>
</body>
</html>
